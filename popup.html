<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookies Blocker</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-width: 260px;
        padding: 16px;
        background: #f5f7fb;
        color: #172033;
      }

      label {
        display: flex;
        gap: 12px;
        align-items: center;
        font-size: 14px;
        font-weight: 600;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }

      p {
        margin: 10px 0 0;
        font-size: 12px;
        color: #58627a;
      }
    </style>
  </head>
  <body>
    <label for="cleanup-toggle">
      <input id="cleanup-toggle" type="checkbox">
      <span>Enable cleanup on domain exit</span>
    </label>
    <p>Deletes cookies for the previous domain when you leave it or close the tab.</p>
    <script src="popup.js"></script>
  </body>
</html>
