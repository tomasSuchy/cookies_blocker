<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookies Blocker</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-width: 260px;
        padding: 16px;
        background: #f5f7fb;
        color: #172033;
      }

      label {
        display: flex;
        gap: 12px;
        align-items: center;
        font-size: 14px;
        font-weight: 600;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }

      p {
        margin: 10px 0 0;
        font-size: 12px;
        color: #58627a;
      }

      .log-card {
        margin-top: 14px;
        padding: 12px;
        border-radius: 10px;
        background: #ffffff;
        border: 1px solid #d8dfed;
      }

      .log-title {
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 700;
        color: #334155;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .log-status {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        color: #172033;
      }

      .log-message,
      .log-meta {
        margin: 6px 0 0;
        font-size: 12px;
        color: #58627a;
      }

      .actions {
        margin-top: 14px;
      }

      .secondary-button {
        width: 100%;
        border: 1px solid #c8d2e6;
        border-radius: 10px;
        background: #ffffff;
        color: #172033;
        font-size: 13px;
        font-weight: 700;
        padding: 10px 12px;
        cursor: pointer;
      }

      .secondary-button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .button-stack {
        display: grid;
        gap: 10px;
      }

      .helper-text {
        margin: -2px 0 0;
        font-size: 12px;
        line-height: 1.4;
        color: #58627a;
      }
    </style>
  </head>
  <body>
    <label for="cleanup-toggle">
      <input id="cleanup-toggle" type="checkbox">
      <span>Enable cleanup on domain exit</span>
    </label>
    <p>Deletes cookies for the previous domain when you leave it or close the tab.</p>
    <section class="actions button-stack">
      <button id="reset-domain" class="secondary-button" type="button">Reset consent for this site</button>
      <button id="manage-patterns" class="secondary-button" type="button">Manage text patterns</button>
      <p class="helper-text">Add your own button texts for reject actions and cookie settings links when a site uses wording that is not covered by the built-in patterns.</p>
    </section>
    <section class="log-card">
      <h1 class="log-title">Last Result</h1>
      <p id="log-status" class="log-status">No data yet.</p>
      <p id="log-message" class="log-message"></p>
      <p id="log-meta" class="log-meta"></p>
    </section>
    <script src="popup.js"></script>
  </body>
</html>
